spring.application.name=recommendation-api

# Avoid Spring Boot’s HTML Whitelabel page on errors (API should stay JSON-friendly).
server.error.whitelabel.enabled=false

spring.datasource.url=jdbc:mysql://localhost:3306/system_rekomendacji?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

ml.service.base-url=http://127.0.0.1:8000

# JWT (change in production; must be >= 32 chars for HS256)
cineband.jwt.secret=change-me-in-production-use-long-random-secret-key-32b
cineband.jwt.expiration-ms=86400000

# Monitoring-friendly logs (override in prod: JSON appender, log aggregation)
logging.level.com.cineband.api=INFO
logging.level.org.springframework.web.servlet.mvc.method.annotation.RequestMappingHandlerMapping=INFO

# QA account (created on startup only if email + nick are free). Set enabled=false in production.
cineband.testing-user.enabled=true
cineband.testing-user.email=cineband.tester@example.com
cineband.testing-user.password=CineBandTest!2026
cineband.testing-user.nick=cineband_tester
cineband.testing-user.display-name=CineBand Tester
